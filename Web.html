<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Neuro Calm — 50–60 BPM</title>
  
  <!-- Google Fonts: Nunito (regular 400) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400&display=swap" rel="stylesheet">

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      height:100vh;
      background:#2d2d2d;
      color:#e2e8f0;
      font-family:'Nunito',system-ui,-apple-system,BlinkMacOSystemFont,'Segoe UI',Roboto,sans-serif;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      transition:background-color 0.12s ease-out;
      overflow:hidden;
      touch-action:manipulation;
    }

    .logo-container {
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:1.2rem;
      margin-bottom:2.5rem;
    }

    .logo {
      width:130px;
      height:auto;
      max-width:38vw;
      border-radius:50%;
      overflow:hidden;
      background:transparent;
      filter:drop-shadow(0 5px 14px rgba(0,0,0,0.28)) brightness(1.05);
      transition:transform 0.3s ease;
    }

    .logo:hover { transform:scale(1.05); }

    h1 {
      font-size:2rem;
      font-weight:400;
      color:#a5b4fc;
      margin:0;
      letter-spacing:1.2px;
      text-shadow:0 2px 10px rgba(0,0,0,0.35);
    }

    .container {
      background:rgba(45,45,45,0.78);
      backdrop-filter:blur(14px);
      border-radius:32px;
      padding:2.8rem 2rem;
      width:92%;
      max-width:400px;
      border:1px solid rgba(148,163,184,0.12);
      box-shadow:0 14px 52px rgba(0,0,0,0.58);
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:2.6rem;
    }

    #bpm-display {
      font-size:5.6rem;
      font-weight:400;
      color:#a5b4fc;
      text-shadow:0 4px 18px rgba(165,180,252,0.25);
      line-height:1;
      margin-bottom:0.8rem;
    }

    input[type="range"] {
      width:100%;
      height:10px;
      margin:1rem 0 2rem 0;
      background:rgba(148,163,184,0.22);
      border-radius:5px;
      appearance:none;
      outline:none;
    }

    input[type="range"]::-webkit-slider-thumb {
      appearance:none;
      width:32px;
      height:32px;
      background:#a5b4fc;
      border-radius:50%;
      box-shadow:0 4px 14px rgba(165,180,252,0.4);
      cursor:pointer;
    }

    input[type="range"]::-moz-range-thumb {
      width:32px;
      height:32px;
      background:#a5b4fc;
      border:none;
      border-radius:50%;
      box-shadow:0 4px 14px rgba(165,180,252,0.4);
      cursor:pointer;
    }

    .controls {
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:2.2rem;
      width:100%;
    }

    .main-row { width:100%; text-align:center; }

    .options-row {
      display:flex;
      flex-wrap:wrap;
      gap:1.6rem 2.4rem;
      justify-content:center;
      align-items:center;
      width:100%;
    }

    .color-group {
      display:flex;
      flex-wrap:nowrap;
      gap:1rem;
      align-items:center;
    }

    button {
      padding:1.1rem 2rem;
      font-size:1.1rem;
      font-weight:400;
      border:none;
      border-radius:22px;
      cursor:pointer;
      transition:all 0.26s ease;
      letter-spacing:0.4px;
      min-width:120px;
      touch-action:manipulation;
    }

    button:active { transform:scale(0.97); }

    #startStop {
      background:#334155;
      color:#f1f5f9;
      min-width:170px;
    }
    #startStop.running {
      background:#475569;
      color:#e2e8f0;
    }

    #blueBtn { background:#1e40af; color:white; }
    #blueBtn.active {
      background:#3b82f6;
      box-shadow:0 0 0 4px rgba(59,130,246,0.38);
    }

    #purpleBtn { background:#6d28d9; color:white; }
    #purpleBtn.active {
      background:#8b5cf6;
      box-shadow:0 0 0 4px rgba(139,92,246,0.38);
    }

    .pulse-control {
      display:flex;
      align-items:center;
      gap:1.2rem;
      font-size:1.15rem;
      color:#cbd5e1;
      font-weight:400;
    }

    .switch {
      position:relative;
      display:inline-block;
      width:62px;
      height:32px;
    }

    .switch input { opacity:0; width:0; height:0; }

    .slider {
      position:absolute;
      cursor:pointer;
      top:0; left:0; right:0; bottom:0;
      background-color:#1e293b;
      transition:.28s;
      border-radius:32px;
    }

    .slider:before {
      position:absolute;
      content:"";
      height:26px;
      width:26px;
      left:3px;
      bottom:3px;
      background-color:white;
      transition:.28s;
      border-radius:50%;
    }

    input:checked + .slider { background-color:#a5b4fc; }

    input:checked + .slider:before { transform:translateX(30px); }

    body.pulse-on {
      background-color:var(--pulse-color, #1e40af);
      transition:background-color 0.09s ease-out;
    }

    @media (prefers-reduced-motion: reduce) {
      body.pulse-on, body { transition:none; }
    }

    .footer {
      margin-top:2.5rem;
      font-size:0.95rem;
      color:#94a3b8;
      opacity:0.8;
      text-align:center;
      letter-spacing:0.5px;
    }

    .footer a {
      color:#a5b4fc;
      text-decoration:none;
      transition:color 0.3s;
    }

    .footer a:hover { color:#c7d2fe; }

    @media (max-height:680px) {
      .logo-container { margin-bottom:1.8rem; }
      .container { padding:2.2rem 1.8rem; gap:2rem; }
      #bpm-display { font-size:5rem; }
      .logo { width:110px; }
    }

    @media (max-width:360px) {
      .options-row { gap:1.2rem 1.6rem; }
      button { padding:1rem 1.6rem; min-width:110px; font-size:1rem; }
      .color-group { gap:0.8rem; }
    }
  </style>
</head>
<body>

  <div class="logo-container">
    <img src="Untitled Design (10).png" alt="Neuro Calm Logo" class="logo">
    <h1>Neuro Calm</h1>
  </div>

  <div class="container">
    <div id="bpm-display">54</div>

    <input type="range" id="bpm-slider" min="50" max="60" value="54" step="1"/>

    <div class="controls">
      <div class="main-row">
        <button id="startStop">START</button>
      </div>

      <div class="options-row">
        <div class="pulse-control">
          <span>Light</span>
          <label class="switch">
            <input type="checkbox" id="pulse-toggle">
            <span class="slider"></span>
          </label>
        </div>

        <div class="color-group">
          <button id="blueBtn" class="active">Blue</button>
          <button id="purpleBtn">Purple</button>
        </div>
      </div>
    </div>
  </div>

  <div class="footer">
    <a href="https://ThriveNeuroHealth.com" target="_blank">ThriveNeuroHealth.com</a>
  </div>

  <script>
    let audioCtx = null;
    let timerID = null;
    let isRunning = false;
    let pulseEnabled = false;
    let pulseColor = 'blue';

    const body = document.body;
    const bpmDisplay = document.getElementById('bpm-display');
    const slider = document.getElementById('bpm-slider');
    const startStopBtn = document.getElementById('startStop');
    const pulseToggle = document.getElementById('pulse-toggle');
    const blueBtn = document.getElementById('blueBtn');
    const purpleBtn = document.getElementById('purpleBtn');

    pulseToggle.checked = pulseEnabled;

    slider.addEventListener('input', () => {
      bpmDisplay.textContent = slider.value;
      if (isRunning) restartPulse();
    });

    function getIntervalMs() {
      return 60000 / Number(slider.value);
    }

    function getPulseColor() {
      return pulseColor === 'purple' ? '#6d28d9cc' : '#1e40afcc';
    }

    function pulse() {
      if (!pulseEnabled) return;
      body.style.setProperty('--pulse-color', getPulseColor());
      body.classList.add('pulse-on');
      setTimeout(() => body.classList.remove('pulse-on'), 90);
    }

    function tick() {
      pulse();

      if (audioCtx) {
        const now = audioCtx.currentTime;
        const duration = 0.65;

        const osc1 = audioCtx.createOscillator();
        osc1.type = 'sine';
        osc1.frequency.value = 140;

        const osc2 = audioCtx.createOscillator();
        osc2.type = 'triangle';
        osc2.frequency.value = 280;

        const filter = audioCtx.createBiquadFilter();
        filter.type = 'lowpass';
        filter.frequency.value = 700;
        filter.Q.value = 0.7;

        const gainNode = audioCtx.createGain();
        gainNode.gain.setValueAtTime(0.00, now);
        gainNode.gain.linearRampToValueAtTime(0.38, now + 0.12);
        gainNode.gain.exponentialRampToValueAtTime(0.0005, now + duration);

        osc1.connect(filter);
        osc2.connect(filter);
        filter.connect(gainNode);
        gainNode.connect(audioCtx.destination);

        osc1.start(now);
        osc1.stop(now + duration);
        osc2.start(now);
        osc2.stop(now + duration);
      }
    }

    function startPulse() {
      if (isRunning) return;
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();

      isRunning = true;
      startStopBtn.textContent = 'PAUSE';
      startStopBtn.classList.add('running');

      let nextBeat = audioCtx.currentTime * 1000;

      function schedule() {
        const nowMs = audioCtx.currentTime * 1000;
        while (nextBeat <= nowMs + 150) {
          tick();
          nextBeat += getIntervalMs();
        }
        timerID = setTimeout(schedule, 30);
      }

      schedule();
    }

    function stopPulse() {
      if (!isRunning) return;
      isRunning = false;
      clearTimeout(timerID);
      startStopBtn.textContent = 'START';
      startStopBtn.classList.remove('running');
      body.classList.remove('pulse-on');
    }

    function restartPulse() {
      stopPulse();
      setTimeout(startPulse, 80);
    }

    startStopBtn.addEventListener('click', () => {
      if (isRunning) stopPulse();
      else startPulse();
    });

    pulseToggle.addEventListener('change', () => {
      pulseEnabled = pulseToggle.checked;
      if (!pulseEnabled) body.classList.remove('pulse-on');
    });

    blueBtn.addEventListener('click', () => {
      pulseColor = 'blue';
      blueBtn.classList.add('active');
      purpleBtn.classList.remove('active');
    });

    purpleBtn.addEventListener('click', () => {
      pulseColor = 'purple';
      purpleBtn.classList.add('active');
      blueBtn.classList.remove('active');
    });
  </script>
</body>
</html>
