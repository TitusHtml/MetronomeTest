<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Calm Pulse — 50–60 BPM</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      background: #2d2d2d;          /* deep soft navy — very calming base */
      color: #e2e8f0;
      font-family: system-ui, -apple-system, BlinkMacOSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: background-color 0.12s ease-out;
      overflow: hidden;
      touch-action: manipulation;   /* better mobile touch */
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 400;
      color: #94a3b8;
      margin-bottom: 1.8rem;
      letter-spacing: 0.5px;
      opacity: 0.9;
    }

    .container {
      background: rgba(45, 45, 45, 0.75);
      backdrop-filter: blur(12px);
      border-radius: 24px;
      padding: 1.8rem 2rem;
      width: 90%;
      max-width: 360px;
      border: 1px solid rgba(148, 163, 184, 0.12);
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.4rem;
    }

    #bpm-display {
      font-size: 4.8rem;
      font-weight: 300;
      color: #a5b4fc;               /* soft indigo-purple for display */
      text-shadow: 0 2px 12px rgba(165,180,252,0.25);
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 0.9rem;
      justify-content: center;
      width: 100%;
    }

    button {
      padding: 0.9rem 1.6rem;
      font-size: 1rem;
      font-weight: 500;
      border: none;
      border-radius: 16px;
      cursor: pointer;
      transition: all 0.22s ease;
      letter-spacing: 0.3px;
      min-width: 110px;
      touch-action: manipulation;
    }

    button:active {
      transform: scale(0.96);
    }

    #startStop {
      background: #334155;
      color: #f1f5f9;
    }
    #startStop.running {
      background: #475569;
      color: #e2e8f0;
    }

    #flash-toggle {
      background: #1e293b;
      color: #cbd5e1;
    }
    #flash-toggle.on {
      background: #334155;
    }

    #color-toggle {
      background: #4c1d95;          /* deep soft purple */
      color: white;
    }
    #color-toggle.purple {
      background: #6d28d9;          /* gentler vibrant purple */
    }

    input[type="range"] {
      width: 100%;
      height: 6px;
      margin: 0.6rem 0;
      background: rgba(148,163,184,0.18);
      border-radius: 3px;
      appearance: none;
      outline: none;
    }

    input[type="range"]::-webkit-slider-thumb {
      appearance: none;
      width: 22px;
      height: 22px;
      background: #a5b4fc;
      border-radius: 50%;
      box-shadow: 0 2px 10px rgba(165,180,252,0.4);
      cursor: pointer;
    }

    input[type="range"]::-moz-range-thumb {
      width: 22px;
      height: 22px;
      background: #a5b4fc;
      border: none;
      border-radius: 50%;
      box-shadow: 0 2px 10px rgba(165,180,252,0.4);
      cursor: pointer;
    }

    /* Full-screen gentle pulse */
    body.pulse-on {
      background-color: var(--pulse-color, #1e40af); /* fallback deep blue */
      transition: background-color 0.09s ease-out;
    }

    @media (prefers-reduced-motion: reduce) {
      body.pulse-on,
      body { transition: none; }
    }
  </style>
</head>
<body>

  <h1>Calm Pulse</h1>

  <div class="container">
    <div id="bpm-display">55</div>

    <input type="range" id="bpm-slider" min="50" max="60" value="55" step="1"/>

    <div class="controls">
      <button id="startStop">START</button>
      <button id="flash-toggle" class="on">PULSE ON</button>
      <button id="color-toggle">BLUE</button>
    </div>
  </div>

  <script>
    let audioCtx = null;
    let timerID = null;
    let isRunning = false;
    let pulseEnabled = true;
    let isPurple = false;

    const body = document.body;
    const bpmDisplay = document.getElementById('bpm-display');
    const slider = document.getElementById('bpm-slider');
    const startStopBtn = document.getElementById('startStop');
    const pulseToggleBtn = document.getElementById('flash-toggle');
    const colorToggleBtn = document.getElementById('color-toggle');

    // Update BPM
    slider.addEventListener('input', () => {
      bpmDisplay.textContent = slider.value;
      if (isRunning) restartPulse();
    });

    function getIntervalMs() {
      return 60000 / Number(slider.value);
    }

    function getPulseColor() {
      return isPurple 
        ? '#6d28d9cc'   // soft translucent purple
        : '#1e40afcc';  // soft translucent indigo-blue
    }

    function pulse() {
      if (!pulseEnabled) return;
      body.style.setProperty('--pulse-color', getPulseColor());
      body.classList.add('pulse-on');
      setTimeout(() => {
        body.classList.remove('pulse-on');
      }, 90);  // gentle short pulse
    }

    function tick() {
      pulse();
      // Very soft, low-volume tone (less startling)
      if (audioCtx) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.type = 'sine';
        osc.frequency.value = 220;          // low, soft tone
        gain.gain.setValueAtTime(0.60, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.12);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.12);
      }
    }

    function startPulse() {
      if (isRunning) return;
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();

      isRunning = true;
      startStopBtn.textContent = 'PAUSE';
      startStopBtn.classList.add('running');

      let nextBeat = audioCtx.currentTime * 1000;

      function schedule() {
        const now = audioCtx.currentTime * 1000;
        while (nextBeat <= now + 150) {
          tick();
          nextBeat += getIntervalMs();
        }
        timerID = setTimeout(schedule, 30);
      }

      schedule();
    }

    function stopPulse() {
      if (!isRunning) return;
      isRunning = false;
      clearTimeout(timerID);
      startStopBtn.textContent = 'START';
      startStopBtn.classList.remove('running');
      body.classList.remove('pulse-on');
    }

    function restartPulse() {
      stopPulse();
      setTimeout(startPulse, 80);
    }

    // Handlers
    startStopBtn.addEventListener('click', () => {
      if (isRunning) stopPulse();
      else startPulse();
    });

    pulseToggleBtn.addEventListener('click', () => {
      pulseEnabled = !pulseEnabled;
      pulseToggleBtn.textContent = pulseEnabled ? 'PULSE ON' : 'PULSE OFF';
      pulseToggleBtn.classList.toggle('on', pulseEnabled);
      if (!pulseEnabled) body.classList.remove('pulse-on');
    });

    colorToggleBtn.addEventListener('click', () => {
      isPurple = !isPurple;
      colorToggleBtn.textContent = isPurple ? 'PURPLE' : 'BLUE';
      colorToggleBtn.classList.toggle('purple', isPurple);
    });

  </script>
</body>
</html>
