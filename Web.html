<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Calm Pulse — 50–60 BPM</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      background: #2d2d2d;
      color: #e2e8f0;
      font-family: system-ui, -apple-system, BlinkMacOSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: background-color 0.12s ease-out;
      overflow: hidden;
      touch-action: manipulation;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 400;
      color: #94a3b8;
      margin-bottom: 1.8rem;
      letter-spacing: 0.5px;
      opacity: 0.9;
    }

    .container {
      background: rgba(45, 45, 45, 0.75);
      backdrop-filter: blur(12px);
      border-radius: 24px;
      padding: 1.8rem 2rem;
      width: 90%;
      max-width: 360px;
      border: 1px solid rgba(148, 163, 184, 0.12);
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.6rem;
    }

    #bpm-display {
      font-size: 4.8rem;
      font-weight: 300;
      color: #a5b4fc;
      text-shadow: 0 2px 12px rgba(165,180,252,0.25);
    }

    .controls {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.4rem;
      width: 100%;
    }

    .main-row {
      width: 100%;
      text-align: center;
    }

    .options-row {
      display: flex;
      flex-wrap: wrap;
      gap: 1.2rem;
      justify-content: center;
      align-items: center;
      width: 100%;
    }

    button {
      padding: 0.9rem 1.5rem;
      font-size: 1rem;
      font-weight: 500;
      border: none;
      border-radius: 16px;
      cursor: pointer;
      transition: all 0.22s ease;
      letter-spacing: 0.3px;
      min-width: 100px;
      touch-action: manipulation;
    }

    button:active {
      transform: scale(0.96);
    }

    #startStop {
      background: #334155;
      color: #f1f5f9;
      min-width: 140px;
    }
    #startStop.running {
      background: #475569;
      color: #e2e8f0;
    }

    #blueBtn {
      background: #1e40af;
      color: white;
    }
    #blueBtn.active {
      background: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59,130,246,0.4);
    }

    #purpleBtn {
      background: #6d28d9;
      color: white;
    }
    #purpleBtn.active {
      background: #8b5cf6;
      box-shadow: 0 0 0 3px rgba(139,92,246,0.4);
    }

    /* Toggle switch area */
    .pulse-control {
      display: flex;
      align-items: center;
      gap: 0.9rem;
      font-size: 1.05rem;
      color: #cbd5e1;
    }

    .switch {
      position: relative;
      display: inline-block;
      width: 54px;
      height: 28px;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #1e293b;
      transition: .24s;
      border-radius: 28px;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 22px;
      width: 22px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: .24s;
      border-radius: 50%;
    }

    input:checked + .slider {
      background-color: #a5b4fc;
    }

    input:checked + .slider:before {
      transform: translateX(26px);
    }

    input[type="range"] {
      width: 100%;
      height: 6px;
      margin: 0.6rem 0;
      background: rgba(148,163,184,0.18);
      border-radius: 3px;
      appearance: none;
      outline: none;
    }

    input[type="range"]::-webkit-slider-thumb {
      appearance: none;
      width: 22px;
      height: 22px;
      background: #a5b4fc;
      border-radius: 50%;
      box-shadow: 0 2px 10px rgba(165,180,252,0.4);
      cursor: pointer;
    }

    input[type="range"]::-moz-range-thumb {
      width: 22px;
      height: 22px;
      background: #a5b4fc;
      border: none;
      border-radius: 50%;
      box-shadow: 0 2px 10px rgba(165,180,252,0.4);
      cursor: pointer;
    }

    body.pulse-on {
      background-color: var(--pulse-color, #1e40af);
      transition: background-color 0.09s ease-out;
    }

    @media (prefers-reduced-motion: reduce) {
      body.pulse-on, body { transition: none; }
    }
  </style>
</head>
<body>

  <h1>Calm Pulse</h1>

  <div class="container">
    <div id="bpm-display">54</div>

    <input type="range" id="bpm-slider" min="50" max="60" value="54" step="1"/>

    <div class="controls">
      <div class="main-row">
        <button id="startStop">START</button>
      </div>

      <div class="options-row">
        <div class="pulse-control">
          <span>Light</span>
          <label class="switch">
            <input type="checkbox" id="pulse-toggle" checked>
            <span class="slider"></span>
          </label>
        </div>

        <button id="blueBtn" class="active">Blue</button>
        <button id="purpleBtn">Purple</button>
      </div>
    </div>
  </div>

  <script>
    let audioCtx = null;
    let timerID = null;
    let isRunning = false;
    let pulseEnabled = true;
    let pulseColor = 'blue';  // 'blue' or 'purple'

    const body = document.body;
    const bpmDisplay = document.getElementById('bpm-display');
    const slider = document.getElementById('bpm-slider');
    const startStopBtn = document.getElementById('startStop');
    const pulseToggle = document.getElementById('pulse-toggle');
    const blueBtn = document.getElementById('blueBtn');
    const purpleBtn = document.getElementById('purpleBtn');

    slider.addEventListener('input', () => {
      bpmDisplay.textContent = slider.value;
      if (isRunning) restartPulse();
    });

    function getIntervalMs() {
      return 60000 / Number(slider.value);
    }

    function getPulseColor() {
      return pulseColor === 'purple' ? '#6d28d9cc' : '#1e40afcc';
    }

    function pulse() {
      if (!pulseEnabled) return;
      body.style.setProperty('--pulse-color', getPulseColor());
      body.classList.add('pulse-on');
      setTimeout(() => body.classList.remove('pulse-on'), 90);
    }

    function tick() {
      pulse();

      if (audioCtx) {
        const duration = 0.035;
        const now = audioCtx.currentTime;

        const bufferSize = audioCtx.sampleRate * duration;
        const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) {
          data[i] = Math.random() * 2 - 1;
        }

        const noise = audioCtx.createBufferSource();
        noise.buffer = buffer;

        const bandpass = audioCtx.createBiquadFilter();
        bandpass.type = 'bandpass';
        bandpass.frequency.value = 1800;
        bandpass.Q.value = 4;

        const gain = audioCtx.createGain();
        gain.gain.setValueAtTime(0.0, now);
        gain.gain.linearRampToValueAtTime(0.45, now + 0.004);
        gain.gain.exponentialRampToValueAtTime(0.001, now + duration);

        noise.connect(bandpass);
        bandpass.connect(gain);
        gain.connect(audioCtx.destination);

        noise.start(now);
        noise.stop(now + duration);
      }
    }

    function startPulse() {
      if (isRunning) return;
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();

      isRunning = true;
      startStopBtn.textContent = 'PAUSE';
      startStopBtn.classList.add('running');

      let nextBeat = audioCtx.currentTime * 1000;

      function schedule() {
        const nowMs = audioCtx.currentTime * 1000;
        while (nextBeat <= nowMs + 150) {
          tick();
          nextBeat += getIntervalMs();
        }
        timerID = setTimeout(schedule, 30);
      }

      schedule();
    }

    function stopPulse() {
      if (!isRunning) return;
      isRunning = false;
      clearTimeout(timerID);
      startStopBtn.textContent = 'START';
      startStopBtn.classList.remove('running');
      body.classList.remove('pulse-on');
    }

    function restartPulse() {
      stopPulse();
      setTimeout(startPulse, 80);
    }

    startStopBtn.addEventListener('click', () => {
      if (isRunning) stopPulse();
      else startPulse();
    });

    pulseToggle.addEventListener('change', () => {
      pulseEnabled = pulseToggle.checked;
      if (!pulseEnabled) body.classList.remove('pulse-on');
    });

    blueBtn.addEventListener('click', () => {
      pulseColor = 'blue';
      blueBtn.classList.add('active');
      purpleBtn.classList.remove('active');
    });

    purpleBtn.addEventListener('click', () => {
      pulseColor = 'purple';
      purpleBtn.classList.add('active');
      blueBtn.classList.remove('active');
    });

  </script>
</body>
</html>
